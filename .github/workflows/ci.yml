name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['24', '25']
        electron: ['40', '41']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install Electron 
        run: npm install --save-dev electron@${{ matrix.electron }}

      - name: Run Tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run npm test

      - name: Run Tests
        if: runner.os != 'Linux'
        run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm install
      - run: npm run lint
